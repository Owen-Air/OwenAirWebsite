name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    name: Check - Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run check
      - run: npm test

  build:
    name: Build check
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: |
          test -d dist || (echo "dist/ not found" && exit 1)
          test -f dist/index.html || (echo "dist/index.html missing" && exit 1)
          test -f dist/_headers || (echo "dist/_headers missing" && exit 1)
